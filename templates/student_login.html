<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tercih Robotu Giris</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at top right, rgba(13, 107, 159, 0.14), transparent 28%),
                linear-gradient(180deg, #f3f8fc 0%, #e7eef6 100%);
        }
        .entry-card {
            width: min(100%, 480px);
            background: #fff;
            border-radius: 24px;
            padding: 30px;
            border: 1px solid rgba(32, 48, 71, 0.08);
            box-shadow: 0 18px 40px rgba(17, 38, 64, 0.08);
            text-align: center;
        }
        .entry-logo {
            height: 76px;
            object-fit: contain;
            margin-bottom: 14px;
        }
    </style>
</head>
<body>
    <div class="entry-card">
        <img src="{{ url_for('static', filename='iu.logo.png') }}" alt="Isik Universitesi Logo" class="entry-logo">
        <h1 class="h3 mb-2">Tercih Robotu</h1>
        <p class="text-secondary mb-4">Devam etmek i&ccedil;in mail adresinizi giriniz.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="mb-3">
                    {% for category, message in messages %}
                    <div class="alert alert-{{ category }} mb-2">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form method="post" class="d-grid gap-3">
            <div>
                <label for="email" class="form-label">Mail adresinizi giriniz</label>
                <input type="email" id="email" name="email" value="{{ email }}" class="form-control" placeholder="ornek@isikun.edu.tr" required>
            </div>
            <button type="submit" class="btn btn-primary">Devam Et</button>
        </form>
    </div>
</body>
</html>
